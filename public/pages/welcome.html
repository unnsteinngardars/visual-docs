<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Welcome</title>
    <style>
      body {
        font: 16px/1.6 system-ui, sans-serif;
        max-width: 720px;
        margin: 40px auto;
        padding: 0 20px;
        color: #222;
      }
      h1 {
        border-bottom: 2px solid #6ea8ff;
        padding-bottom: 8px;
      }
      code {
        background: #f2f4f8;
        padding: 2px 6px;
        border-radius: 4px;
      }
    </style>
  </head>
  <body>
    <h1>Welcome</h1>
    <p>
      This is the shell for browsing Claude-generated HTML files. Drop new
      <code>.html</code> files into <code>pages/</code> and add an entry to
      <code>manifest.json</code>.
    </p>
    <p>
      Each page renders inside a sandboxed iframe, so its CSS and scripts stay
      isolated from the shell and from other pages.
    </p>
  </body>
</html>
